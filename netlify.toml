[build]
  publish = "frontend"

# Redirect all /api/* calls from Netlify frontend to your Render backend
[[redirects]]
  from   = "/api/*"
  to     = "https://aammii.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/images/*"
  to     = "https://aammii.onrender.com/images/:splat"
  status = 200
  force  = true

# SPA fallback — serve index.html for all unknown routes
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
