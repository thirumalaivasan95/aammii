<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aammii Shop — Natural Lifestyle Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-leaf">🌿</span>
      <span class="logo-text">Aammii</span>
      <span class="logo-sub">Natural Shop</span>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()"/>
      <span class="search-icon">⌕</span>
    </div>

    <button class="cart-btn" onclick="toggleCart()">
      <span class="cart-icon">🛒</span>
      <span class="cart-badge" id="cartBadge">0</span>
      <span class="cart-label">Cart</span>
      <span class="cart-total-pill" id="cartPill">₹0</span>
    </button>
  </div>
</header>

<!-- ── UPLOAD HERO ─────────────────────────────────────────────────────────── -->
<section class="hero" id="hero">
  <div class="hero-content">
    <h1 class="hero-title">Farm-to-Home.<br/>Natural &amp; Pure.</h1>
    <p class="hero-subtitle">Upload your product catalogue PDF to start shopping</p>
    <label class="upload-btn" id="uploadLabel">
      <span class="upload-icon">📄</span>
      <span id="uploadText">Choose Catalogue PDF</span>
      <input type="file" id="pdfInput" accept=".pdf" onchange="uploadPDF(this)" hidden/>
    </label>
    <div class="upload-hint">or drag &amp; drop your PDF here</div>
    <div id="uploadStatus" class="upload-status hidden"></div>
    <div id="uploadProgress" class="progress-wrap hidden">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>
  <div class="hero-art">
    <div class="float-badge b1">🌾 Organic</div>
    <div class="float-badge b2">🍯 Natural</div>
    <div class="float-badge b3">🌿 Pure</div>
    <div class="hero-circle c1"></div>
    <div class="hero-circle c2"></div>
  </div>
</section>

<!-- ── CATEGORY FILTER BAR ────────────────────────────────────────────────── -->
<div class="filter-bar hidden" id="filterBar">
  <div class="filter-inner">
    <button class="cat-chip active" onclick="filterByCategory('all', this)">All</button>
    <!-- dynamic chips injected here -->
  </div>
  <div class="sort-wrap">
    <label>Sort:</label>
    <select id="sortSelect" onchange="sortProducts()">
      <option value="default">Default</option>
      <option value="price-asc">Price ↑</option>
      <option value="price-desc">Price ↓</option>
      <option value="name-asc">Name A–Z</option>
    </select>
  </div>
</div>

<!-- ── PRODUCT GRID ────────────────────────────────────────────────────────── -->
<main class="shop-main hidden" id="shopMain">
  <div class="results-info" id="resultsInfo"></div>
  <div class="product-grid" id="productGrid">
    <!-- cards injected by JS -->
  </div>
  <div class="no-results hidden" id="noResults">
    <span>😔</span> No products match your search.
  </div>
</main>

<!-- ── FLOATING CART PANEL ────────────────────────────────────────────────── -->
<aside class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>🛒 Your Cart</h2>
    <button class="close-cart" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-body" id="cartBody">
    <div class="cart-empty" id="cartEmpty">
      <span>🌿</span>
      <p>Your cart is empty</p>
    </div>
    <div id="cartItems"></div>
  </div>
  <div class="cart-footer" id="cartFooter">
    <div class="cart-summary">
      <div class="sum-row"><span>Items</span><span id="totalItems">0</span></div>
      <div class="sum-row grand"><span>Total</span><span id="totalPrice">₹0.00</span></div>
    </div>
    <button class="place-order-btn" id="placeOrderBtn" onclick="placeOrder()" disabled>
      Place Order &amp; Download Invoice
    </button>
  </div>
</aside>
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<!-- ── TOAST NOTIFICATION ─────────────────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
